<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reusable Modal Popup</title>

  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
</head>

     <div class="container">

    <h1>✨ Modal Popup System</h1>

    <p>
      Click button to open popup modal
    </p>

    <button class="open-btn" id="openBtn">
      Open Popup
    </button>

  </div>

  <!-- MODAL -->

  <div class="modal" id="modal">

    <div class="modal-box">

      <button class="close-btn" id="closeBtn">
        ✕
      </button>

      <div class="icon">
        🎉
      </div>

      <h2>Popup Opened</h2>

      <p>
        This is a reusable modal popup using
        HTML, CSS and JavaScript.
      </p>

      <div class="buttons">

        <button class="cancel-btn" id="cancelBtn">
          Cancel
        </button>

        <button class="confirm-btn" id="confirmBtn">
          Confirm
        </button>

      </div>

    </div>

  </div>

  <script src="./assets/js/script.js"></script>
  <script src="./assets/js/bootstrap.min.js"></script>
</body>

</html>
